<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeFlip Desktop</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7f8; color: #17202a; }
      main { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }
      aside { background: #102c38; color: #f6fbfc; padding: 24px; }
      section { padding: 28px; display: grid; gap: 18px; align-content: start; }
      .band { background: white; border: 1px solid #d9e2e7; border-radius: 8px; padding: 20px; }
      h1, h2, p { margin: 0; }
      p { color: #60717c; }
      button { min-height: 36px; border-radius: 8px; border: 1px solid #cbd5dc; background: white; padding: 0 12px; }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>TimeFlip</h1>
        <p style="color:#b9c8ce">Local desktop tracking</p>
      </aside>
      <section>
        <div class="band">
          <p>Current state</p>
          <h2>No active session</h2>
          <p>Open the generated frontend during Wails development for the full interactive dashboard.</p>
        </div>
        <div class="band">
          <h2>Devices</h2>
          <button>Scan</button>
        </div>
      </section>
    </main>
  </body>
</html>
