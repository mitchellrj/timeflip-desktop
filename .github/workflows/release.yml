name: Release

on:
  push:
    tags:
      - v*

permissions: read-all

jobs:
  validate-tag:
    name: Validate SemVer tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      version: ${{ steps.validate.outputs.version }}
      is_prerelease: ${{ steps.validate.outputs.is_prerelease }}
      release_name: ${{ steps.validate.outputs.release_name }}
    steps:
      - name: Validate tag
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'

          if [[ ! "$tag" =~ $semver ]]; then
            printf 'Tag %s is not a valid leading-v SemVer tag.\n' "$tag" >&2
            exit 1
          fi

          version="${tag#v}"
          is_prerelease=false
          if [[ "$version" == *-* ]]; then
            is_prerelease=true
          fi

          {
            printf 'tag=%s\n' "$tag"
            printf 'version=%s\n' "$version"
            printf 'is_prerelease=%s\n' "$is_prerelease"
            printf 'release_name=%s\n' "$tag"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build macOS desktop bundle (${{ matrix.goarch }})
    needs: validate-tag
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: macos-15-intel
          - goarch: arm64
            runner: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag==v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag==v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # tag==v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Apple signing certificate
        shell: bash
        env:
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          MACOS_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
          MACOS_NOTARYTOOL_APPLE_ID: ${{ secrets.MACOS_NOTARYTOOL_APPLE_ID }}
          MACOS_NOTARYTOOL_TEAM_ID: ${{ secrets.MACOS_NOTARYTOOL_TEAM_ID }}
          MACOS_NOTARYTOOL_PASSWORD: ${{ secrets.MACOS_NOTARYTOOL_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64
            MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD
            MACOS_DEVELOPER_ID_APPLICATION_IDENTITY
            MACOS_NOTARYTOOL_APPLE_ID
            MACOS_NOTARYTOOL_TEAM_ID
            MACOS_NOTARYTOOL_PASSWORD
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              printf 'Required release signing secret %s is not configured.\n' "$name" >&2
              exit 1
            fi
          done

          keychain_path="$RUNNER_TEMP/timeflip-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          cert_path="$RUNNER_TEMP/developer-id-application.p12"

          printf '%s' "$MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64" | base64 -D > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          security find-identity -v -p codesigning "$keychain_path"
          if ! security find-identity -v -p codesigning "$keychain_path" | grep -F "$MACOS_DEVELOPER_ID_APPLICATION_IDENTITY"; then
            printf 'Developer ID Application identity was not found in the signing keychain.\n' >&2
            exit 1
          fi

      - name: Build frontend assets
        shell: bash
        run: |
          set -euo pipefail

          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Build desktop app archive
        shell: bash
        env:
          MACOS_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
          MACOS_NOTARYTOOL_APPLE_ID: ${{ secrets.MACOS_NOTARYTOOL_APPLE_ID }}
          MACOS_NOTARYTOOL_TEAM_ID: ${{ secrets.MACOS_NOTARYTOOL_TEAM_ID }}
          MACOS_NOTARYTOOL_PASSWORD: ${{ secrets.MACOS_NOTARYTOOL_PASSWORD }}
        run: |
          set -euo pipefail

          app_name="TimeFlip Desktop.app"
          app_dir="build/release-bundle/${app_name}"
          asset="timeflip-desktop-darwin-${{ matrix.goarch }}.zip"
          notary_asset="$RUNNER_TEMP/${asset}"
          version="${{ needs.validate-tag.outputs.version }}"
          marketing_version="${version%%[-+]*}"
          build_version="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          mkdir -p "$app_dir/Contents/MacOS" "$app_dir/Contents/Resources/frontend" build/release-assets
          actual_arch="$(go env GOARCH)"
          if [[ "$actual_arch" != "${{ matrix.goarch }}" ]]; then
            printf 'Runner Go architecture %s does not match expected %s.\n' "$actual_arch" "${{ matrix.goarch }}" >&2
            exit 1
          fi
          go build -trimpath -o "$app_dir/Contents/MacOS/timeflip-desktop" ./cmd/timeflip-desktop
          cp -R frontend/dist "$app_dir/Contents/Resources/frontend/dist"
          cp README.md LICENSE "$app_dir/Contents/Resources/"

          cat > "$app_dir/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>TimeFlip Desktop</string>
            <key>CFBundleExecutable</key>
            <string>timeflip-desktop</string>
            <key>CFBundleIdentifier</key>
            <string>com.mitchellrj.timeflip-desktop</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>TimeFlip Desktop</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${marketing_version}</string>
            <key>CFBundleVersion</key>
            <string>${build_version}</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
          </dict>
          </plist>
          PLIST

          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleName' "$app_dir/Contents/Info.plist")" = "TimeFlip Desktop"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_dir/Contents/Info.plist")" = "com.mitchellrj.timeflip-desktop"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app_dir/Contents/Info.plist")" = "$marketing_version"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app_dir/Contents/Info.plist")" = "$build_version"
          test -x "$app_dir/Contents/MacOS/timeflip-desktop"
          test -f "$app_dir/Contents/Resources/frontend/dist/index.html"
          codesign \
            --force \
            --deep \
            --options runtime \
            --timestamp \
            --sign "$MACOS_DEVELOPER_ID_APPLICATION_IDENTITY" \
            "$app_dir"
          codesign --verify --deep --strict --verbose=4 "$app_dir"
          ditto -c -k --keepParent "$app_dir" "$notary_asset"
          xcrun notarytool submit "$notary_asset" \
            --apple-id "$MACOS_NOTARYTOOL_APPLE_ID" \
            --team-id "$MACOS_NOTARYTOOL_TEAM_ID" \
            --password "$MACOS_NOTARYTOOL_PASSWORD" \
            --wait
          xcrun stapler staple "$app_dir"
          xcrun stapler validate "$app_dir"
          codesign --verify --deep --strict --verbose=4 "$app_dir"
          ditto -c -k --keepParent "$app_dir" "build/release-assets/${asset}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag==v7.0.1
        with:
          name: release-assets-darwin-${{ matrix.goarch }}
          path: build/release-assets/*
          if-no-files-found: error

      - name: Delete Apple signing keychain
        if: always()
        shell: bash
        run: |
          security delete-keychain "$RUNNER_TEMP/timeflip-signing.keychain-db" || true

  collect-release-assets:
    name: Collect release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      base64_subjects: ${{ steps.subjects.outputs.base64_subjects }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download release artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/release-assets
          for artifact in \
            release-assets-darwin-amd64 \
            release-assets-darwin-arm64
          do
            gh run download "$GITHUB_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name "$artifact" \
              --dir build/release-assets
          done

      - name: Compute SLSA subjects
        id: subjects
        shell: bash
        run: |
          set -euo pipefail

          cd build/release-assets
          mapfile -t files < <(find . -maxdepth 1 -type f -name 'timeflip-desktop-darwin-*.zip' -printf '%f\n' | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            printf 'No release artifacts found for SLSA subject generation.\n' >&2
            exit 1
          fi

          sha256sum "${files[@]}" > subjects.sha256sum
          {
            printf 'base64_subjects='
            base64 -w0 subjects.sha256sum
            printf '\n'
          } >> "$GITHUB_OUTPUT"
          rm subjects.sha256sum

      - name: Upload collected release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag==v7.0.1
        with:
          name: release-assets
          path: build/release-assets/*
          if-no-files-found: error

  provenance:
    name: Generate SLSA provenance
    needs: collect-release-assets
    permissions:
      actions: read
      contents: write
      id-token: write
    # SLSA verifier requires this reusable workflow ref to be refs/tags/vX.Y.Z.
    # See:
    # * https://github.com/slsa-framework/slsa-github-generator/blob/main/README.md#referencing-slsa-builders-and-generators
    # * https://github.com/slsa-framework/slsa-github-generator/issues/4440
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.collect-release-assets.outputs.base64_subjects }}
      provenance-name: timeflip-desktop-provenance.intoto.jsonl
      upload-assets: false

  publish-release:
    name: Publish GitHub Release
    needs:
      - validate-tag
      - collect-release-assets
      - provenance
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.validate-tag.outputs.tag }}
      IS_PRERELEASE: ${{ needs.validate-tag.outputs.is_prerelease }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag==v6.0.2
        with:
          fetch-depth: 0

      - name: Download release artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/release-assets
          gh run download "$GITHUB_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name release-assets \
            --dir build/release-assets
          gh run download "$GITHUB_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name timeflip-desktop-provenance.intoto.jsonl \
            --dir build/release-assets

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail

          cd build/release-assets
          mapfile -t files < <(
            find . -maxdepth 1 -type f \
              ! -name '*.intoto.jsonl' \
              ! -name 'SHA256SUMS.txt' \
              -printf '%f\n' | sort
          )

          if [[ "${#files[@]}" -eq 0 ]]; then
            printf 'No release binaries found for checksum generation.\n' >&2
            exit 1
          fi

          sha256sum "${files[@]}" > SHA256SUMS.txt

      - name: Create release with assets and tag notes
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            printf 'Release %s already exists; not modifying existing release.\n' "$RELEASE_TAG"
            exit 0
          fi

          args=(--title "$RELEASE_TAG" --notes-from-tag)
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          mapfile -t assets < <(find build/release-assets -maxdepth 1 -type f -print | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            printf 'No release assets found.\n' >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" "${args[@]}" "${assets[@]}"
