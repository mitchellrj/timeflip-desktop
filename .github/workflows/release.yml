name: Release

on:
  push:
    tags:
      - v*

permissions: read-all

jobs:
  validate-tag:
    name: Validate SemVer tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      version: ${{ steps.validate.outputs.version }}
      is_prerelease: ${{ steps.validate.outputs.is_prerelease }}
      release_name: ${{ steps.validate.outputs.release_name }}
    steps:
      - name: Validate tag
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'

          if [[ ! "$tag" =~ $semver ]]; then
            printf 'Tag %s is not a valid leading-v SemVer tag.\n' "$tag" >&2
            exit 1
          fi

          version="${tag#v}"
          is_prerelease=false
          if [[ "$version" == *-* ]]; then
            is_prerelease=true
          fi

          {
            printf 'tag=%s\n' "$tag"
            printf 'version=%s\n' "$version"
            printf 'is_prerelease=%s\n' "$is_prerelease"
            printf 'release_name=%s\n' "$tag"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build macOS desktop bundle
    needs: validate-tag
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag==v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag==v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # tag==v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend assets
        shell: bash
        run: |
          set -euo pipefail

          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Build desktop binary
        shell: bash
        run: |
          set -euo pipefail

          arch="$(uname -m)"
          bundle_dir="build/release-bundle/timeflip-desktop"
          asset="timeflip-desktop-darwin-${arch}.tar.gz"

          mkdir -p "$bundle_dir" build/release-assets
          go build -trimpath -o "$bundle_dir/timeflip-desktop" ./cmd/timeflip-desktop
          mkdir -p "$bundle_dir/frontend"
          cp -R frontend/dist "$bundle_dir/frontend/dist"
          cp README.md LICENSE "$bundle_dir/"
          tar -C build/release-bundle -czf "build/release-assets/${asset}" timeflip-desktop

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag==v7.0.1
        with:
          name: release-assets
          path: build/release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - validate-tag
      - build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.validate-tag.outputs.tag }}
      IS_PRERELEASE: ${{ needs.validate-tag.outputs.is_prerelease }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag==v6.0.2
        with:
          fetch-depth: 0

      - name: Download release artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/release-assets
          gh run download "$GITHUB_RUN_ID" \
            --name release-assets \
            --dir build/release-assets

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail

          cd build/release-assets
          mapfile -t files < <(
            find . -maxdepth 1 -type f \
              ! -name '*.intoto.jsonl' \
              ! -name 'SHA256SUMS.txt' \
              -printf '%f\n' | sort
          )

          if [[ "${#files[@]}" -eq 0 ]]; then
            printf 'No release binaries found for checksum generation.\n' >&2
            exit 1
          fi

          sha256sum "${files[@]}" > SHA256SUMS.txt

      - name: Create release with assets and tag notes
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            printf 'Release %s already exists; not modifying existing release.\n' "$RELEASE_TAG"
            exit 0
          fi

          args=(--title "$RELEASE_TAG" --notes-from-tag)
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          mapfile -t assets < <(find build/release-assets -maxdepth 1 -type f -print | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            printf 'No release assets found.\n' >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" "${args[@]}" "${assets[@]}"
