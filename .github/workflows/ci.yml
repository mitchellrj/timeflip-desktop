name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend build and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag==v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # tag==v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend tests
        run: npm --prefix frontend test

      - name: Build frontend
        run: npm --prefix frontend run build

  test:
    name: Go quality
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag==v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag==v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go quality checks
        env:
          GOTRACEBACK: single
          RUN_GO_RACE: "1"
        run: scripts/dev/go-quality.sh

      - name: Run Go fuzz smoke test
        env:
          GO_FUZZTIME: 10s
        run: scripts/dev/go-fuzz-smoke.sh

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag==v7.0.1
        if: always()
        with:
          name: coverage-macos-latest
          path: build/coverage.out
          if-no-files-found: ignore

  lint:
    name: golangci-lint
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag==v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag==v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # tag==v9.2.1
        with:
          version: v2.12.1
          args: --timeout=5m

  govulncheck:
    name: govulncheck
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag==v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag==v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@31f7c5463448f83528bd771c2d978d940080c9fd # branch==main; see golang/go#78345
        with:
          go-version-file: go.mod
          package: ./...
